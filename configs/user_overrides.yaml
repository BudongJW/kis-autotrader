# 사용자 수동 설정 — 자동 워크플로(market-learn / optimize)가 절대 덮어쓰지 않음.
# load_config가 strategy.yaml 로드 직후 이 파일을 deep-merge로 재적용한다.
# 자동화가 strategy.yaml의 universe.default를 지워도 매 로드마다 여기 값이 복원된다.
# (규칙: universe.default 리스트는 이 파일 값으로 완전 교체. 다른 하위섹션은 strategy.yaml 유지.)
universe:
  default:
  - symbol: '395160'
    name: KODEX 미국나스닥100TR
  - symbol: '005930'
    name: 삼성전자
    type: stock
  - symbol: '000660'
    name: SK하이닉스
    type: stock
  - symbol: '034220'
    name: LG디스플레이
    type: stock
  - symbol: '010140'
    name: 삼성중공업
    type: stock
  - symbol: '011200'
    name: HMM
    type: stock

# 일일 익절 목표(자동 클로버 방지). 당일 +1% 도달 시 신규매수 중단(이익 잠금). 0=비활성.
risk:
  daily_profit_target_pct: 0.01
  # 성과 검증 단계별 포지션 상한 램프 (전액 금지, 하드 최대 65%). 검증되면 자동 상향.
  sizing_ramp:
    enabled: true
    base_weight: 0.35
    hard_max: 0.65
    tiers:
    - {trades: 20, win_rate: 0.50, weight: 0.45}
    - {trades: 40, win_rate: 0.55, weight: 0.55}
    - {trades: 60, win_rate: 0.58, weight: 0.65}

# 인버스 진입 사이즈·게이트 — 자동화 클로버 방지로 여기 고정.
bear_strategy:
  inverse_ta_entry: true
  inverse_ta_min: 20
  inverse_regimes:
  - BEAR
  - CRISIS
  - CAUTION
  inverse_caution_pct: 0.15
  inverse_min_krw: 250000
  inverse_max_krw: 350000
  # KIS 계좌 파생ETF(레버리지·인버스 ETP) 거래신청 완료 후 true로 바꾸면 인버스 매수 활성화.
  # 2026-06-30 사용자 KIS 거래신청 완료 → 활성화.
  derivative_etf_enabled: true

# 조간/인트라데이 모멘텀 사이클 — 자동 클로버 방지로 여기 고정.
# 프로세스: 강신호에 진입 → 익절 2.5%/손절 1% → 15:00 오후 강제청산 → 쿨다운 후 재판단·재진입.
morning_momentum:
  enabled: true
  window_start_kst: '09:00'
  entry_end_kst: '14:00'
  exit_by_kst: '15:00'
  up_threshold_pct: 0.6
  down_threshold_pct: 0.6
  intraday_confirm_pct: 0.0
  position_krw: 300000
  take_profit_pct: 0.025
  stop_loss_pct: 0.01
  trail_activate_pct: 0.015
  trail_gap_pct: 0.008
  breakeven_trigger_pct: 0.007
  breakeven_buffer_pct: 0.001
  reentry_cooldown_min: 30
  max_cycles_per_day: 3
  max_move_pct: 2.0
  long_block_regimes: [BEAR, CRISIS]
  long_symbol: '069500'
  long_name: KODEX 200
  inverse_symbol: '114800'
  inverse_name: KODEX 인버스

# 미장 방향성 스캘프 — 나스닥 상승→QQQM 롱, 하락→PSQ 숏. 자동 클로버 방지로 여기 고정.
# QQQ 불가($712>가용$555) → 저가판 QQQM($293) 롱. US 왕복수수료 0.5% 커버 위해 문턱/본전버퍼 확대.
us_momentum:
  enabled: true
  window_start_kst: '22:30'
  entry_end_kst: '23:59'
  exit_by_kst: '99:99'
  up_threshold_pct: 0.8
  down_threshold_pct: 0.8
  intraday_confirm_pct: 0.0
  take_profit_pct: 0.025
  stop_loss_pct: 0.012
  trail_activate_pct: 0.015
  trail_gap_pct: 0.008
  breakeven_trigger_pct: 0.01
  breakeven_buffer_pct: 0.006
  reentry_cooldown_min: 40
  max_cycles_per_day: 2
  max_move_pct: 3.0
  long_block_regimes: [BEAR, CRISIS]
  long_symbol: QQQM
  long_name: Invesco NASDAQ 100 (저가판)
  long_exchange: NASD
  inverse_symbol: PSQ
  inverse_name: ProShares Short QQQ (나스닥 1x 인버스)
  inverse_exchange: AMEX
  position_usd: 300
  session_exit_min_before: 15
