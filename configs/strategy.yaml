# 전략 파라미터 - .kis.yaml 포맷과 호환되도록 단순화
# 사용:
#   from src.config import settings
#   import yaml
#   with open("configs/strategy.yaml") as f: cfg = yaml.safe_load(f)

strategies:
  golden_cross:
    short_window: 5
    long_window: 20
    # 추가 필터 (구현 시)
    # min_volume: 1000000        # 일거래량 최소
    # trend_filter_ma: 60        # 이 MA 위에서만 진입

  # 다음 전략 추가 시 여기에 정의
  # momentum:
  #   lookback: 20
  #   top_n: 5

universe:
  # 변동성 돌파 백테스트(2024~2025) Sharpe > 0 상위 8종목
  # 마지막 갱신: 2026-05-11
  default:
    - { symbol: "010130", name: "고려아연" }      # Sharpe 1.37
    - { symbol: "005930", name: "삼성전자" }      # Sharpe 1.10
    - { symbol: "000660", name: "SK하이닉스" }    # Sharpe 0.93
    - { symbol: "035900", name: "JYP Ent." }    # Sharpe 0.80
    - { symbol: "196170", name: "알테오젠" }      # Sharpe 0.78
    - { symbol: "011200", name: "HMM" }         # Sharpe 0.69
    - { symbol: "066570", name: "LG전자" }       # Sharpe 0.60
    - { symbol: "015760", name: "한국전력" }      # Sharpe 0.38

risk:
  # 종목 1개당 자본의 최대 비율
  max_position_weight: 0.20
  # 최대 동시 포지션 수
  max_concurrent_positions: 5
  # 손절 (% 단위)
  stop_loss_pct: 0.03
  # 익절
  take_profit_pct: 0.05
  # 일일 손실 한도 (이 % 손실 시 봇 자동 정지)
  daily_loss_limit_pct: 0.05
