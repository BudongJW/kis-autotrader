# ── 하락장 전략 설정 ──
bear_strategy:
  enabled: true
  # 레짐 전환 기준
  regime_switch:
    sma_period: 200            # 200일 이동평균
    bear_entry_threshold: -0.03  # SMA200 대비 -3% 이하 → 하락장 진입
    bear_exit_threshold: 0.02    # SMA200 대비 +2% 이상 → 하락장 해제
    confirmation_days: 3         # 3일 연속 확인 후 전환
  # 카나리아 경보
  canary_alert:
    momentum_months: [1, 3, 6, 12]
    momentum_weights: [12, 4, 2, 1]   # VAA 가중 모멘텀
  # 포지션 배분 (하락장 모드)
  bear_allocation:
    inverse_max_pct: 0.30        # 인버스 최대 30%
    defensive_min_pct: 0.40      # 방어자산 최소 40%
    cash_min_pct: 0.20           # 현금 최소 20%
  # 변동성 타겟팅
  volatility_target: 0.12       # 연간 12% 변동성 목표

