name: Weekly Performance Report

on:
  schedule:
    # 매주 토요일 09:00 KST (금요일 24:00 UTC)
    - cron: '0 0 * * 6'
  workflow_dispatch:

env:
  TZ: Asia/Seoul

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pykrx

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          MODE=live
          KIS_APPKEY=${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET=${{ secrets.KIS_APPSECRET }}
          KIS_HTSID=${{ secrets.KIS_HTSID }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE=01
          ENVEOF

      - name: Download trade log
        uses: actions/download-artifact@v4
        with:
          name: trade-log
          path: logs/
        continue-on-error: true

      - name: Generate report
        env:
          PYTHONPATH: '.'
        run: |
          python -c "
          from src.tracker import get_summary
          from src.kis_client import KISClient
          from src.bot.single_run import load_universe, get_available_cash

          client = KISClient()
          cash = get_available_cash(client)
          s = get_summary()
          universe = load_universe()

          print('=== 주간 성과 리포트 ===')
          print(f'현재 예수금: {cash:,}원')
          print(f'누적 거래: {s[\"total_trades\"]}건')
          print(f'총 매수금: {s[\"total_invested\"]:,}원')
          print(f'총 매도금: {s[\"total_returned\"]:,}원')
          print(f'손익: {s[\"pnl\"]:+,}원 ({s[\"pnl_pct\"]:+.2f}%)')
          print(f'대상 종목: {[u[\"name\"] for u in universe]}')
          "

      - name: Upload trade log
        uses: actions/upload-artifact@v4
        with:
          name: trade-log
          path: logs/trades.csv
          retention-days: 90
        if: always()
