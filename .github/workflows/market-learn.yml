name: Market Learning

on:
  schedule:
    # 장 전 학습: 08:30 KST (= 23:30 전날 UTC)
    - cron: '30 23 * * 0-4'
    # 장 후 학습 (한국): 16:00 KST (= 07:00 UTC) — 한국장 종료 후
    - cron: '0 7 * * 1-5'
    # 장 후 학습 (미국): 06:30 KST (= 21:30 전날 UTC) — 미국장 종료 후
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      phase:
        description: 'pre (장전) / post (장후) / post_us (미국장후)'
        required: false
        default: 'pre'

env:
  TZ: Asia/Seoul

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt hmmlearn lightgbm scikit-learn yfinance pykrx

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          MODE=live
          KIS_APPKEY=${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET=${{ secrets.KIS_APPSECRET }}
          KIS_HTSID=${{ secrets.KIS_HTSID }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE=01
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Download learning data
        uses: actions/download-artifact@v4
        with:
          name: learning-data
          path: logs/
        continue-on-error: true

      - name: Download token cache
        uses: actions/download-artifact@v4
        with:
          name: kis-token-cache
          path: logs/
        continue-on-error: true

      - name: Download ML models
        uses: actions/download-artifact@v4
        with:
          name: ml-models
          path: logs/
        continue-on-error: true

      - name: Download US positions
        uses: actions/download-artifact@v4
        with:
          name: us-positions-state
          path: logs/
        continue-on-error: true

      - name: Download bear state
        uses: actions/download-artifact@v4
        with:
          name: bear-state
          path: logs/
        continue-on-error: true

      # 경험 재구성 입력원: 영속 canonical trades.csv (단일 진실원천)
      - name: Restore canonical trades.csv
        run: |
          mkdir -p logs
          curl -fsSL "https://raw.githubusercontent.com/BudongJW/kis-trading-journal/main/state/trades.csv" \
            -o logs/trades.csv && echo "trades.csv 복원($(wc -l < logs/trades.csv)줄)" || echo "trades.csv 없음"
        continue-on-error: true

      # 영속 학습상태(LGBM 모델, 정확도, 경험) 복원: download-artifact@v4는 run-id 없이
      # 이전 런 아티팩트를 못 받아 항상 실패한다. repo에 커밋된 state/learning/* 를
      # logs/ 로 되돌려야 lgbm_predictor(logs/lgbm_model.pkl)가 모델을 실제로 로드한다.
      - name: Restore persisted learning state (repo to logs)
        run: |
          mkdir -p logs
          if [ -d state/learning ] && [ -n "$(ls -A state/learning 2>/dev/null)" ]; then
            cp -f state/learning/* logs/ 2>/dev/null || true
            echo "학습상태 복원: $(ls state/learning | wc -l)개 파일 (logs/)"
            [ -f logs/lgbm_model.pkl ] && echo "  LGBM 모델 복원됨: $(wc -c < logs/lgbm_model.pkl) bytes" || echo "  (LGBM 모델 아직 없음 — 최초 학습 대기)"
          else
            echo "state/learning 비어있음 (최초 실행 — 이번 런이 첫 모델 생성)"
          fi

      - name: Run market learning
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
          SCHED: ${{ github.event.schedule }}
        run: |
          # phase를 각 크론의 '의도'로 고정한다. GitHub이 스케줄을 수 시간 지연
          # 발화시켜도(=벽시계 기반 자동판별이 post→pre로 오분류 → LGBM 재학습 영구
          # 누락) 의도한 phase가 그대로 실행되도록 schedule 표현식으로 매핑.
          if [ -n "${{ github.event.inputs.phase }}" ]; then
            PHASE="${{ github.event.inputs.phase }}"
          elif [ "$SCHED" = "0 7 * * 1-5" ]; then
            PHASE="post"        # 16:00 KST 의도 (LGBM 재학습)
          elif [ "$SCHED" = "30 21 * * 1-5" ]; then
            PHASE="post_us"     # 06:30 KST 의도
          elif [ "$SCHED" = "30 23 * * 0-4" ]; then
            PHASE="pre"         # 08:30 KST 의도
          else
            # 수동/알수없는 트리거: 시각 기반 폴백
            HOUR=$(TZ=Asia/Seoul date +%H)
            if [ "$HOUR" -ge 6 ] && [ "$HOUR" -lt 9 ]; then
              PHASE="post_us"
            elif [ "$HOUR" -ge 14 ] && [ "$HOUR" -lt 21 ]; then
              PHASE="post"
            else
              PHASE="pre"
            fi
          fi
          echo "Phase: $PHASE (schedule=$SCHED)"
          python -m src.market_learner --phase $PHASE

      - name: Commit config + learning state
        run: |
          git config user.name "kis-autotrader-bot"
          git config user.email "bot@kis-autotrader"
          # 학습 상태(모델·경험·정확도)를 repo에 영속화 → 트레이딩 봇이 checkout으로 받아
          # LGBM 융합·자기학습에 사용. 아티팩트(현재 run만 보임) 미복원 문제 우회.
          mkdir -p state/learning
          for f in lgbm_model.pkl lgbm_features.json experience.json ta_accuracy.json \
                   regime_memory.json gap_accuracy.json sector_accuracy.json \
                   market_history.json strategy_weights.json fusion_weights.json \
                   bear_state.json bear_performance.json; do
            [ -f "logs/$f" ] && cp "logs/$f" "state/learning/$f" || true
          done
          git add configs/strategy.yaml state/learning
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: 시장 학습 파라미터·상태 갱신 $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main || true
            git push
          fi

      - name: Upload learning data
        uses: actions/upload-artifact@v4
        with:
          name: learning-data
          path: |
            logs/market_history.json
            logs/ta_accuracy.json
            logs/experience.json
            logs/regime_memory.json
            logs/strategy_weights.json
            logs/fusion_weights.json
            logs/gap_accuracy.json
            logs/hold_outcomes.json
            logs/sector_accuracy.json
            logs/us_trade_history.json
            logs/cross_market.json
            logs/learning_diary.json
            logs/vaa_state.json
            logs/flow_cache.json
            logs/sector_rotation.json
            logs/tail_risk.json
            logs/r_multiples.json
          overwrite: true
          retention-days: 180
        if: always()

      - name: Upload bear state
        uses: actions/upload-artifact@v4
        with:
          name: bear-state
          path: |
            logs/bear_state.json
            logs/bear_performance.json
          overwrite: true
          retention-days: 30
        if: always()

      - name: Upload ML models
        uses: actions/upload-artifact@v4
        with:
          name: ml-models
          path: |
            logs/lgbm_model.pkl
            logs/lgbm_features.json
          overwrite: true
          retention-days: 30
        if: always()

      - name: Upload token cache
        uses: actions/upload-artifact@v4
        with:
          name: kis-token-cache
          path: logs/.kis_token_cache.json
          overwrite: true
          retention-days: 1
        if: always()
