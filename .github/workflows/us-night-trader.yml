name: US Night Trader

on:
  schedule:
    # public repo라 분 한도 무제한. 매 5분 watchdog cron으로 dead time 최소화.
    # concurrency cancel-in-progress: false → 진행 중 loop가 있으면 새 cron은 큐잉/드롭.
    #
    # Pre-open (서머/동절 모두 커버, UTC 12:30~14:30)
    - cron: '30,50 12 * * 1-5'    # 21:30, 21:50 KST
    - cron: '10 13 * * 1-5'       # 22:10 KST
    # 미국장 본세션 watchdog (서머 22:30~05:00 KST = UTC 13:30~20:00)
    # 동절 23:30~06:00 KST = UTC 14:30~21:00 → 양쪽 다 커버
    - cron: '*/5 13-20 * * 1-5'   # UTC 13:00~20:55 매 5분
    - cron: '*/15 21 * * 1-5'     # UTC 21:00~21:45 (동절 마감 직전)
    # 봇 내부에서 is_us_market_hours()로 실제 개장 여부 확인 → 비개장 시 즉시 종료

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run 모드 (true/false)'
        required: false
        default: 'false'
      mode:
        description: 'loop (연속감시) / once (1회) / refresh (대시보드만)'
        required: false
        default: 'loop'

# mode별로 concurrency 그룹 분리 → portfolio refresh가 진행 중 loop 살해 X
concurrency:
  group: us-night-trader-${{ github.event.inputs.mode || 'loop' }}
  # loop는 안 죽임, once/refresh는 사용자가 의도적으로 새로고침
  cancel-in-progress: ${{ github.event.inputs.mode != 'loop' && github.event.inputs.mode != '' }}

env:
  TZ: Asia/Seoul

jobs:
  us-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 400  # 최대 ~7시간 커버 (23:30~06:00)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pykrx hmmlearn optuna lightgbm scikit-learn yfinance

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          MODE=live
          KIS_APPKEY=${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET=${{ secrets.KIS_APPSECRET }}
          KIS_HTSID=${{ secrets.KIS_HTSID }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE=01
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Download trade log
        uses: actions/download-artifact@v4
        with:
          name: trade-log
          path: logs/
        continue-on-error: true

      - name: Download token cache
        uses: actions/download-artifact@v4
        with:
          name: kis-token-cache
          path: logs/
        continue-on-error: true

      - name: Download US positions
        uses: actions/download-artifact@v4
        with:
          name: us-positions-state
          path: logs/
        continue-on-error: true

      - name: Download learning data
        uses: actions/download-artifact@v4
        with:
          name: learning-data
          path: logs/
        continue-on-error: true

      - name: Download bear state
        uses: actions/download-artifact@v4
        with:
          name: bear-state
          path: logs/
        continue-on-error: true

      - name: Download killswitch state
        uses: actions/download-artifact@v4
        with:
          name: killswitch-state
          path: logs/
        continue-on-error: true

      - name: Download SQLite ledger
        uses: actions/download-artifact@v4
        with:
          name: ledger-db
          path: logs/
        continue-on-error: true

      - name: Run US night bot
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          MODE="${{ github.event.inputs.mode || 'loop' }}"
          if [ "$MODE" = "once" ]; then
            python -m src.bot.night_run $DRY_RUN_FLAG
          else
            python -m src.bot.night_run --loop $DRY_RUN_FLAG
          fi

      - name: Checkout journal repo
        uses: actions/checkout@v4
        with:
          repository: BudongJW/kis-trading-journal
          token: ${{ secrets.JOURNAL_PAT }}
          path: journal
        continue-on-error: true

      - name: Update portfolio status
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
        run: python -m src.journal_quick
        continue-on-error: true

      - name: Push journal update
        run: |
          cd journal
          git config user.name "kis-autotrader-bot"
          git config user.email "bot@kis-autotrader"
          git add -A
          if git diff --cached --quiet; then
            echo "No journal changes"
          else
            # 커밋 라벨을 KST 시각에 맞춰 정직하게 (env: TZ=Asia/Seoul 적용됨).
            # 이 워크플로는 미국장 시간(밤 21~07 KST) 외에도 watchdog/장외 새로고침으로
            # 한국 낮에 돌 수 있는데, 그때 "US night update"로 찍히면 오해를 부른다.
            H=$((10#$(date +'%H'))); HM=$(date +'%H:%M')
            if [ "$H" -ge 21 ] || [ "$H" -le 7 ]; then
              MSG="auto: 미국장 야간 업데이트 $HM"
            else
              MSG="auto: 장외 새로고침(미국장 마감) $HM"
            fi
            git commit -m "$MSG"
            git push
          fi
        continue-on-error: true

      - name: Upload trade log
        uses: actions/upload-artifact@v4
        with:
          name: trade-log
          path: logs/trades.csv
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload SQLite ledger
        uses: actions/upload-artifact@v4
        with:
          name: ledger-db
          path: logs/ledger.db
          overwrite: true
          retention-days: 180
        if: always()

      - name: Upload killswitch state
        uses: actions/upload-artifact@v4
        with:
          name: killswitch-state
          path: logs/killswitch.json
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload US positions
        uses: actions/upload-artifact@v4
        with:
          name: us-positions-state
          path: logs/us_positions.json
          overwrite: true
          retention-days: 7
        if: always()

      - name: Upload token cache
        uses: actions/upload-artifact@v4
        with:
          name: kis-token-cache
          path: logs/.kis_token_cache.json
          overwrite: true
          retention-days: 1
        if: always()

      - name: Upload learning data
        uses: actions/upload-artifact@v4
        with:
          name: learning-data
          path: |
            logs/market_history.json
            logs/ta_accuracy.json
            logs/experience.json
            logs/regime_memory.json
            logs/strategy_weights.json
            logs/fusion_weights.json
          overwrite: true
          retention-days: 180
        if: always()

      - name: Upload bear state
        uses: actions/upload-artifact@v4
        with:
          name: bear-state
          path: |
            logs/bear_state.json
            logs/bear_performance.json
          overwrite: true
          retention-days: 30
        if: always()
