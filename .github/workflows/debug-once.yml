name: Debug Script

# 일회성 디버그 스크립트 실행용. workflow_dispatch만.
# scripts/debug_*.py 모듈을 선택해서 실행.

on:
  workflow_dispatch:
    inputs:
      script:
        description: '실행할 스크립트 모듈 (예: scripts.debug_psamount)'
        required: true
        default: 'scripts.debug_psamount'

env:
  TZ: Asia/Seoul

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          MODE=live
          KIS_APPKEY=${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET=${{ secrets.KIS_APPSECRET }}
          KIS_HTSID=${{ secrets.KIS_HTSID }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE=01
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Run debug script
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
        run: python -m ${{ github.event.inputs.script }}
