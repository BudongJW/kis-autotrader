name: KIS AutoTrader

on:
  schedule:
    # cancel-in-progress: true가 새 cron이 진행 중인 봇을 죽이기 때문에
    # 장중(09:00~15:30 KST) 발화 cron은 거래 세션을 중단시킨다.
    # 따라서 pre-market(장 시작 전) 3중화만 두고 장중 cron은 모두 제거.
    # 봇은 장 시작 전 sleep → 09:00 KST에 자동으로 매매 시작.
    - cron: '0 23 * * 0-4'    # 08:00 KST — 가장 이른 pre-market
    - cron: '30 23 * * 0-4'   # 08:30 KST — pre-market 추가 redundancy
    - cron: '55 23 * * 0-4'   # 08:55 KST — 장 시작 직전 메인
    # 안전망: 장 마감 직전. 진행 중인 봇을 cancel해도 손실 작음(15분만 남음).
    - cron: '15 6 * * 1-5'    # 15:15 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run 모드 (true/false)'
        required: false
        default: 'false'
      mode:
        description: 'loop (연속감시) / once (1회)'
        required: false
        default: 'loop'

concurrency:
  group: autotrader
  cancel-in-progress: true

env:
  TZ: Asia/Seoul

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 400  # GitHub 최대 360분으로 클램프됨. 09:00~15:00 커버

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pykrx hmmlearn optuna lightgbm scikit-learn yfinance

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          MODE=live
          KIS_APPKEY=${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET=${{ secrets.KIS_APPSECRET }}
          KIS_HTSID=${{ secrets.KIS_HTSID }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE=01
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Download trade log
        uses: actions/download-artifact@v4
        with:
          name: trade-log
          path: logs/
        continue-on-error: true

      - name: Download token cache
        uses: actions/download-artifact@v4
        with:
          name: kis-token-cache
          path: logs/
        continue-on-error: true

      - name: Download positions
        uses: actions/download-artifact@v4
        with:
          name: positions-state
          path: logs/
        continue-on-error: true

      - name: Download learning data
        uses: actions/download-artifact@v4
        with:
          name: learning-data
          path: logs/
        continue-on-error: true

      - name: Download ML models
        uses: actions/download-artifact@v4
        with:
          name: ml-models
          path: logs/
        continue-on-error: true

      - name: Download killswitch state
        uses: actions/download-artifact@v4
        with:
          name: killswitch-state
          path: logs/
        continue-on-error: true

      - name: Download SQLite ledger
        uses: actions/download-artifact@v4
        with:
          name: ledger-db
          path: logs/
        continue-on-error: true

      - name: Run bot
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          MODE="${{ github.event.inputs.mode || 'loop' }}"
          if [ "$MODE" = "once" ]; then
            python -m src.bot.single_run $DRY_RUN_FLAG
          else
            python -m src.bot.single_run --loop $DRY_RUN_FLAG
          fi

      - name: Checkout journal repo
        uses: actions/checkout@v4
        with:
          repository: BudongJW/kis-trading-journal
          token: ${{ secrets.JOURNAL_PAT }}
          path: journal
        continue-on-error: true

      - name: Update portfolio status
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
        run: python -m src.journal_quick
        continue-on-error: true

      - name: Push journal update
        run: |
          cd journal
          git config user.name "kis-autotrader-bot"
          git config user.email "bot@kis-autotrader"
          git add -A
          if git diff --cached --quiet; then
            echo "No journal changes"
          else
            git commit -m "auto: portfolio update $(date +'%H:%M')"
            git push
          fi
        continue-on-error: true

      - name: Upload trade log
        uses: actions/upload-artifact@v4
        with:
          name: trade-log
          path: logs/trades.csv
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload positions
        uses: actions/upload-artifact@v4
        with:
          name: positions-state
          path: logs/positions.json
          overwrite: true
          retention-days: 7
        if: always()

      - name: Upload SQLite ledger
        uses: actions/upload-artifact@v4
        with:
          name: ledger-db
          path: logs/ledger.db
          overwrite: true
          retention-days: 180
        if: always()

      - name: Upload killswitch state
        uses: actions/upload-artifact@v4
        with:
          name: killswitch-state
          path: logs/killswitch.json
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload token cache
        uses: actions/upload-artifact@v4
        with:
          name: kis-token-cache
          path: logs/.kis_token_cache.json
          overwrite: true
          retention-days: 1
        if: always()

      - name: Upload slippage log
        uses: actions/upload-artifact@v4
        with:
          name: slippage-log
          path: logs/slippage.json
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload learning data
        uses: actions/upload-artifact@v4
        with:
          name: learning-data
          path: |
            logs/market_history.json
            logs/ta_accuracy.json
            logs/experience.json
            logs/regime_memory.json
            logs/strategy_weights.json
            logs/fusion_weights.json
            logs/gap_accuracy.json
            logs/hold_outcomes.json
            logs/sector_accuracy.json
          overwrite: true
          retention-days: 180
        if: always()
