name: KIS AutoTrader

on:
  schedule:
    # public repo라 분 한도 무제한. 자주 발화해도 OK.
    # concurrency cancel-in-progress: false 이므로 진행 중 loop가 있으면 새 cron은 큐잉/드롭됨.
    # → 봇이 살아있으면 노이즈 없음, 죽었으면 즉시 새 loop 기동.
    #
    # Pre-market 3중화 (장 시작 직전 토큰 갱신 + 봇 준비)
    - cron: '0 23 * * 0-4'    # 08:00 KST
    - cron: '30 23 * * 0-4'   # 08:30 KST
    - cron: '55 23 * * 0-4'   # 08:55 KST
    # 장중 watchdog: 매 5분마다 (UTC 00:00~06:55 = KST 09:00~15:55)
    # 진행 중 loop가 살아있으면 모두 큐잉/드롭, 죽었으면 즉시 새 loop dispatch
    - cron: '*/5 0-6 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run 모드 (true/false)'
        required: false
        default: 'false'
      mode:
        description: 'loop (연속감시) / once (1회) / refresh (대시보드만)'
        required: false
        default: 'loop'

# mode별로 concurrency 그룹 분리 → portfolio refresh용 once가 진행 중 loop를 살해하지 않도록.
# cron 트리거는 default mode인 'loop' 그룹에 들어감.
concurrency:
  group: autotrader-${{ github.event.inputs.mode || 'loop' }}
  # loop는 안 죽임 (cancel-in-progress: false) → 새 cron이 와도 큐잉/드롭, 진행 중 봇 안전
  # once/refresh는 cancel-in-progress: true (사용자가 의도적으로 새로고침)
  cancel-in-progress: ${{ github.event.inputs.mode != 'loop' && github.event.inputs.mode != '' }}

env:
  TZ: Asia/Seoul

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 400  # GitHub 최대 360분으로 클램프됨. 09:00~15:00 커버

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pykrx hmmlearn optuna lightgbm scikit-learn yfinance

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          MODE=live
          KIS_APPKEY=${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET=${{ secrets.KIS_APPSECRET }}
          KIS_HTSID=${{ secrets.KIS_HTSID }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE=01
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Download trade log
        uses: actions/download-artifact@v4
        with:
          name: trade-log
          path: logs/
        continue-on-error: true

      - name: Download token cache
        uses: actions/download-artifact@v4
        with:
          name: kis-token-cache
          path: logs/
        continue-on-error: true

      - name: Download positions
        uses: actions/download-artifact@v4
        with:
          name: positions-state
          path: logs/
        continue-on-error: true

      - name: Download learning data
        uses: actions/download-artifact@v4
        with:
          name: learning-data
          path: logs/
        continue-on-error: true

      - name: Download ML models
        uses: actions/download-artifact@v4
        with:
          name: ml-models
          path: logs/
        continue-on-error: true

      - name: Download killswitch state
        uses: actions/download-artifact@v4
        with:
          name: killswitch-state
          path: logs/
        continue-on-error: true

      - name: Download SQLite ledger
        uses: actions/download-artifact@v4
        with:
          name: ledger-db
          path: logs/
        continue-on-error: true

      # canonical trades.csv 복원 (journal repo는 public) → 봇이 전체 거래이력을 보고
      # 캐리 포지션을 손절 관리 대상으로 흡수할 수 있게.
      - name: Restore canonical trades.csv
        run: |
          mkdir -p logs
          curl -fsSL "https://raw.githubusercontent.com/BudongJW/kis-trading-journal/main/state/trades.csv" -o logs/trades.csv \
            && echo "canonical trades.csv 복원" || echo "canonical 없음 — 빈 상태로 시작"
        continue-on-error: true

      # positions.json git 영속화: 아티팩트는 이전 run을 못 봐서 매 run 리셋 →
      # 봇이 자기 포지션을 잊고 손절을 안 거는 문제(6-08 091160 -14% 방치)의 뿌리.
      # trades.csv처럼 journal repo의 canonical에서 복원(아티팩트 미복원 우회).
      - name: Restore positions.json
        run: |
          mkdir -p logs
          curl -fsSL "https://raw.githubusercontent.com/BudongJW/kis-trading-journal/main/state/positions.json" -o logs/positions.json \
            && echo "positions.json 복원(git canonical)" || echo "positions.json 없음 — 캐리 흡수로 보완"
        continue-on-error: true

      # 학습 상태 복원: market-learn이 repo state/learning에 커밋한 LGBM 모델·경험·정확도를
      # logs로 복원 → 봇이 LGBM 융합·자기학습에 사용(아티팩트 미복원 우회).
      - name: Restore learning state
        run: |
          mkdir -p logs
          if [ -d state/learning ]; then
            cp -f state/learning/* logs/ 2>/dev/null && echo "학습 상태 복원(LGBM·경험)" || echo "학습 상태 일부 없음"
          else
            echo "state/learning 없음 — 첫 학습 전"
          fi
        continue-on-error: true

      - name: Run bot
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          MODE="${{ github.event.inputs.mode || 'loop' }}"
          if [ "$MODE" = "once" ]; then
            python -m src.bot.single_run $DRY_RUN_FLAG
          else
            python -m src.bot.single_run --loop $DRY_RUN_FLAG
          fi

      - name: Checkout journal repo
        if: always()
        uses: actions/checkout@v4
        with:
          repository: BudongJW/kis-trading-journal
          token: ${{ secrets.JOURNAL_PAT }}
          path: journal
        continue-on-error: true

      - name: Update journal (portfolio + trades 누적)
        if: always()
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
        run: |
          git -C journal config user.name "kis-autotrader-bot"
          git -C journal config user.email "bot@kis-autotrader"
          # canonical trades.csv에 이번 run 거래를 union 누적 후 portfolio 재생성·푸시.
          # 오버랩/양 워크플로 경합 대비: 최신으로 reset → 재병합 → push, 거부 시 재시도.
          for i in 1 2 3; do
            git -C journal fetch origin main && git -C journal reset --hard origin/main
            python -m src.merge_trades journal/state/trades.csv logs/trades.csv || true
            cp journal/state/trades.csv logs/trades.csv 2>/dev/null || true
            # positions.json도 canonical로 영속화(봇이 다음 run에 자기 포지션 기억 → 손절 유지)
            mkdir -p journal/state
            [ -s logs/positions.json ] && cp logs/positions.json journal/state/positions.json || true
            python -m src.journal_quick || true
            git -C journal add -A
            if git -C journal diff --cached --quiet; then echo "변경 없음"; break; fi
            git -C journal commit -m "auto: portfolio update $(date +'%H:%M')"
            if git -C journal push; then echo "푸시 완료"; break; else echo "푸시 거부 — 재시도 $i"; fi
          done
        continue-on-error: true

      - name: Upload trade log
        uses: actions/upload-artifact@v4
        with:
          name: trade-log
          path: logs/trades.csv
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload positions
        uses: actions/upload-artifact@v4
        with:
          name: positions-state
          path: logs/positions.json
          overwrite: true
          retention-days: 7
        if: always()

      - name: Upload SQLite ledger
        uses: actions/upload-artifact@v4
        with:
          name: ledger-db
          path: logs/ledger.db
          overwrite: true
          retention-days: 180
        if: always()

      - name: Upload killswitch state
        uses: actions/upload-artifact@v4
        with:
          name: killswitch-state
          path: logs/killswitch.json
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload token cache
        uses: actions/upload-artifact@v4
        with:
          name: kis-token-cache
          path: logs/.kis_token_cache.json
          overwrite: true
          retention-days: 1
        if: always()

      - name: Upload slippage log
        uses: actions/upload-artifact@v4
        with:
          name: slippage-log
          path: logs/slippage.json
          overwrite: true
          retention-days: 90
        if: always()

      - name: Upload learning data
        uses: actions/upload-artifact@v4
        with:
          name: learning-data
          path: |
            logs/market_history.json
            logs/ta_accuracy.json
            logs/experience.json
            logs/regime_memory.json
            logs/strategy_weights.json
            logs/fusion_weights.json
            logs/gap_accuracy.json
            logs/hold_outcomes.json
            logs/sector_accuracy.json
          overwrite: true
          retention-days: 180
        if: always()
