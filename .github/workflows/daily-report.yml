name: Daily Report

on:
  schedule:
    # 평일 16:00 KST (= 07:00 UTC) 장 마감 후
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

env:
  TZ: Asia/Seoul

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pykrx hmmlearn lightgbm scikit-learn

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          MODE=live
          KIS_APPKEY=${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET=${{ secrets.KIS_APPSECRET }}
          KIS_HTSID=${{ secrets.KIS_HTSID }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE=01
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Download logs
        uses: actions/download-artifact@v4
        with:
          name: trade-log
          path: logs/
        continue-on-error: true

      - name: Download daily log
        uses: actions/download-artifact@v4
        with:
          name: daily-log
          path: logs/
        continue-on-error: true

      - name: Download learning data
        uses: actions/download-artifact@v4
        with:
          name: learning-data
          path: logs/
        continue-on-error: true

      - name: Download ML models
        uses: actions/download-artifact@v4
        with:
          name: ml-models
          path: logs/
        continue-on-error: true

      - name: Run daily report
        env:
          PYTHONPATH: '.'
          PYTHONIOENCODING: 'utf-8'
        run: python -m src.daily_report

      - name: Upload daily log
        uses: actions/upload-artifact@v4
        with:
          name: daily-log
          path: logs/daily_report.csv
          overwrite: true
          retention-days: 180

      - name: Upload learning data
        uses: actions/upload-artifact@v4
        with:
          name: learning-data
          path: |
            logs/market_history.json
            logs/ta_accuracy.json
            logs/experience.json
            logs/regime_memory.json
            logs/strategy_weights.json
            logs/gap_accuracy.json
            logs/hold_outcomes.json
            logs/sector_accuracy.json
          overwrite: true
          retention-days: 180
        if: always()

      - name: Upload ML models
        uses: actions/upload-artifact@v4
        with:
          name: ml-models
          path: |
            logs/lgbm_model.pkl
            logs/lgbm_features.json
          overwrite: true
          retention-days: 30
        if: always()
